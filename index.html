<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>睡眠管理習慣追蹤</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <!-- React & ReactDOM UMD -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <!-- Babel Standalone -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    // 註冊自訂 Babel 預設以解決 importSource 衝突問題
    Babel.registerPreset("custom-react", {
      presets: [
        [Babel.availablePresets["react"], { runtime: "classic" }]
      ]
    });
  </script>
  <style>
    body {
      background-color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }
    .custom-shadow {
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
    }
    /* 噴泉紙屑動畫 */
    @keyframes confetti-fly {
      0% { transform: translate(0, 0) scale(1) rotate(0deg); opacity: 1; }
      100% { transform: translate(var(--tw-x), var(--tw-y)) scale(0.5) rotate(var(--tw-r)); opacity: 0; }
    }
    .animate-confetti {
      animation: confetti-fly 1.2s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
    }
  </style>
</head>
<body class="bg-white text-slate-800 flex justify-center min-h-screen items-center p-4">

  <!-- 應用程式掛載點 -->
  <div id="root" class="w-full max-w-md bg-white rounded-3xl custom-shadow overflow-hidden border border-slate-100 min-h-[700px] flex flex-col relative"></div>

  <!-- React 程式碼 -->
  <script type="text/babel" data-presets="custom-react">
    const { useState, useEffect, useRef } = React;

    // 預設習慣數據
    const HABIT_CATEGORIES = [
      {
        id: 'daytime',
        title: 'Daytime Activity Habits',
        color: 'amber',
        bgClass: 'bg-amber-500',
        borderClass: 'border-amber-500',
        textClass: 'text-amber-600',
        habits: [
          { id: 'd1', text: 'Avoid caffeine after noon' },
          { id: 'd2', text: 'Get 15-20 minutes of morning sunlight' }
        ]
      },
      {
        id: 'evening',
        title: 'Evening Behavior Habits',
        color: 'cyan',
        bgClass: 'bg-cyan-500',
        borderClass: 'border-cyan-500',
        textClass: 'text-cyan-600',
        habits: [
          { id: 'e1', text: '15-20 minutes of stretching' },
          { id: 'e2', text: 'Dim house lights 1 hour before bed' }
        ]
      },
      {
        id: 'bedtime',
        title: 'Bedtime Relaxation Rituals',
        color: 'indigo',
        bgClass: 'bg-indigo-600',
        borderClass: 'border-indigo-600',
        textClass: 'text-indigo-600',
        habits: [
          { id: 'b1', text: 'Stop using electronics 30 minutes before bed' },
          { id: 'b2', text: 'Read a physical book for 15 minutes' }
        ]
      }
    ];

    function App() {
      const [step, setStep] = useState(1); // 1: 選擇習慣, 2: 設定目標/鬧鐘
      const [selectedHabits, setSelectedHabits] = useState([]);
      const [confettis, setConfettis] = useState([]);
      const containerRef = useRef(null);

      // 切換選取習慣
      const toggleHabit = (id) => {
        setSelectedHabits(prev => 
          prev.includes(id) ? prev.filter(hId => hId !== id) : [...prev, id]
        );
      };

      // 觸發慶祝紙屑特效
      const triggerConfetti = () => {
        const newConfettis = Array.from({ length: 40 }).map((_, i) => ({
          id: Date.now() + i,
          x: (Math.random() - 0.5) * 260,
          y: -Math.random() * 200 - 50,
          r: Math.random() * 360,
          color: ['#F59E0B', '#10B981', '#3B82F6', '#8B5CF6', '#EC4899', '#6366F1'][Math.floor(Math.random() * 6)],
          size: Math.random() * 8 + 6
        }));
        setConfettis(newConfettis);
        setTimeout(() => setConfettis([]), 1200);
      };

      // 自動捲動邏輯 (Step 1 -> Step 2)
      useEffect(() => {
        if (step === 2) {
          triggerConfetti();
          if (containerRef.current) {
            containerRef.current.scrollTo({ top: 0, behavior: 'smooth' });
          }
        }
      }, [step]);

      return (
        <div ref={containerRef} class="w-full flex-1 flex flex-col overflow-y-auto max-h-[800px] p-6 relative">
          
          {/* 紙屑動畫渲染 */}
          <div class="absolute top-1/3 left-1/2 pointer-events-none z-50">
            {confettis.map(c => (
              <div
                key={c.id}
                class="absolute animate-confetti rounded-sm"
                style={{
                  '--tw-x': `${c.x}px`,
                  '--tw-y': `${c.y}px`,
                  '--tw-r': `${c.r}deg`,
                  backgroundColor: c.color,
                  width: `${c.size}px`,
                  height: `${c.size}px`,
                  left: '-4px',
                  top: '-4px'
                }}
              />
            ))}
          </div>

          {/* 頁首標題 */}
          <div class="mb-8 text-center">
            <h1 class="text-2xl font-bold tracking-tight text-slate-900">Sleep Flow</h1>
            <p class="text-xs text-slate-400 font-medium mt-1 uppercase tracking-widest">睡眠管理</p>
          </div>

          {step === 1 ? (
            /* 步驟一：選擇挑戰習慣 */
            <div class="flex-1 flex flex-col justify-between transition-all duration-500 opacity-100">
              <div>
                <h2 class="text-lg font-semibold text-slate-800 mb-1">選擇你的挑戰習慣</h2>
                <p class="text-sm text-slate-400 mb-6">建立專屬的日常與睡前儀式，優化睡眠品質</p>

                {HABIT_CATEGORIES.map(category => (
                  <div key={category.id} class="mb-6">
                    <h3 class={`text-xs font-bold uppercase tracking-wider ${category.textClass} mb-3`}>
                      {category.title}
                    </h3>
                    <div class="space-y-3">
                      {category.habits.map(habit => {
                        const isSelected = selectedHabits.includes(habit.id);
                        return (
                          <div
                            key={habit.id}
                            onClick={() => toggleHabit(habit.id)}
                            class={`flex items-center justify-between p-4 rounded-2xl border cursor-pointer transition-all duration-300 ${
                              isSelected 
                                ? 'border-slate-200 bg-slate-50/50 shadow-sm' 
                                : 'border-slate-100 hover:border-slate-200 bg-white'
                            }`}
                          >
                            <span class={`text-sm pr-4 font-medium transition-colors ${isSelected ? 'text-slate-900' : 'text-slate-600'}`}>
                              {habit.text}
                            </span>
                            
                            {/* 圓形按鈕勾選狀態樣式變更點 */}
                            <div class={`w-6 h-6 rounded-full flex items-center justify-center border-2 transition-all duration-300 shrink-0 ${
                              isSelected 
                                ? `${category.bgClass} ${category.borderClass} scale-105 shadow-sm shadow-black/10` 
                                : 'border-slate-200 bg-transparent'
                            }`}>
                              {isSelected && (
                                <svg class="w-3.5 h-3.5 text-white stroke-[3.5]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                  <path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7" />
                                </svg>
                              )}
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                ))}
              </div>

              <div class="mt-6">
                <button
                  disabled={selectedHabits.length === 0}
                  onClick={() => setStep(2)}
                  class={`w-full py-4 rounded-2xl font-semibold text-sm tracking-wide transition-all duration-300 ${
                    selectedHabits.length > 0
                      ? 'bg-slate-900 text-white shadow-lg shadow-slate-900/10 hover:bg-slate-800'
                      : 'bg-slate-100 text-slate-400 cursor-not-allowed'
                  }`}
                >
                  繼續設定目標
                </button>
              </div>
            </div>
          ) : (
            /* 步驟二：設定目標與鬧鐘 */
            <div class="flex-1 flex flex-col justify-between transition-all duration-500 opacity-100">
              <div>
                <h2 class="text-lg font-semibold text-slate-800 mb-1">設定目標與提醒</h2>
                <p class="text-sm text-slate-400 mb-6">為您挑選的 {selectedHabits.length} 個習慣配置合適的時間</p>

                {/* 裝飾性純大獎盃 (無外圓框，放射噴泉效果起點) */}
                <div class="flex justify-center my-6">
                  <svg class="w-28 h-28 text-amber-400 drop-shadow-sm" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="1.2">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M12 14l9-5-9-5-9 5 9 5z" />
                    <path strokeLinecap="round" strokeLinejoin="round" d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z" />
                    <path strokeLinecap="round" strokeLinejoin="round" d="M12 14l4 2.222v3.293c0 .319-.172.615-.453.77L12 22.25l-3.547-1.965a1.027 1.027 0 01-.453-.77v-3.293L12 14z" />
                  </svg>
                </div>

                <div class="bg-slate-50 rounded-2xl p-4 border border-slate-100 mb-6">
                  <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">每日睡眠目標</label>
                  <div class="flex items-center justify-between">
                    <span class="text-sm font-medium text-slate-700">目標作息時間</span>
                    <span class="text-sm font-bold text-slate-900">23:00 - 07:00 (8小時)</span>
                  </div>
                </div>

                <div class="space-y-4">
                  <div class="p-4 rounded-2xl border border-slate-100 bg-white flex items-center justify-between">
                    <div>
                      <h4 class="text-sm font-semibold text-slate-800">日間行為提醒鬧鐘</h4>
                      <p class="text-xs text-slate-400 mt-0.5">提醒進行晨光與避免咖啡因</p>
                    </div>
                    <span class="text-sm font-bold text-slate-900 bg-slate-50 px-3 py-1.5 rounded-xl border border-slate-100">12:00</span>
                  </div>
                  <div class="p-4 rounded-2xl border border-slate-100 bg-white flex items-center justify-between">
                    <div>
                      <h4 class="text-sm font-semibold text-slate-800">晚間放鬆準備鬧鐘</h4>
                      <p class="text-xs text-slate-400 mt-0.5">提醒調暗燈光、停止電子產品</p>
                    </div>
                    <span class="text-sm font-bold text-slate-900 bg-slate-50 px-3 py-1.5 rounded-xl border border-slate-100">22:30</span>
                  </div>
                </div>
              </div>

              <div class="mt-8 flex gap-3">
                <button
                  onClick={() => setStep(1)}
                  class="flex-1 py-4 rounded-2xl font-semibold text-sm text-slate-500 bg-slate-50 border border-slate-100 hover:bg-slate-100 transition-colors"
                >
                  返回修改
                </button>
                <button
                  onClick={() => alert('恭喜！睡眠管理計畫已成功啟動！')}
                  class="flex-[2] py-4 rounded-2xl font-semibold text-sm tracking-wide bg-slate-900 text-white shadow-lg shadow-slate-900/10 hover:bg-slate-800 transition-colors"
                >
                  開啟健康睡眠
                </button>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
